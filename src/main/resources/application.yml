## ============================================================
## SmartF&B — Cấu hình chính ứng dụng
## Java 21 + Spring Boot 3.3 + PostgreSQL 16
## ============================================================

spring:
  application:
    name: smartfnb

  ## ------ JPA & Hibernate ------
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway quản lý schema, Hibernate chỉ validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        globally_quoted_identifiers: false
    open-in-view: false           # Tắt OSIV — tránh N+1 ẩn

  ## ------ DataSource (PostgreSQL 16) ------
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartfnb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SmartFnbHikariPool

  ## ------ Flyway Migration ------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  ## ------ Thread Pool (Java 21 Virtual Threads) ------
  threads:
    virtual:
      enabled: true               # Tomcat dùng Virtual Threads

## ------ Server ------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true

## ------ JWT Configuration ------
jwt:
  secret: ${JWT_SECRET:SmartFnbSuperSecretKey2026ChangeInProduction!@#$%^&*()}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}          # 1 giờ
  refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}   # 7 ngày

## ------ Logging ------
logging:
  level:
    com.smartfnb: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

## ------ SpringDoc / Swagger ------
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: false

## ------ Actuator ------
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
